name: Deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: # allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false # let in-progress deployments finish

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm # cache node_modules between runs
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm run build # outputs static files to ./out
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # upload the static build for deployment

  deploy:
    runs-on: ubuntu-latest
    needs: build # wait for build job to succeed
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # surfaces the live URL in the Actions UI
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
